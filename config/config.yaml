app:
  name: linkedin-outreach-automation
  dry_run: true
  timezone: UTC

safety:
  daily_connection_limit: 20
  daily_comment_limit: 25
  max_profiles_per_run: 10
  allow_commenting: true
  allow_liking: true
  allow_withdrawals: false
  require_manual_login: true
  emojis_allowed: false

browser:
  headless: false
  slow_mo_ms: 35
  storage_state_path: .auth/linkedin-storage.json
  user_data_dir: .browser/linkedin
  viewport_width_min: 1200
  viewport_width_max: 1500
  viewport_height_min: 780
  viewport_height_max: 980
  navigation_timeout_ms: 45000
  action_timeout_ms: 15000

delays:
  between_profiles_seconds_min: 120
  between_profiles_seconds_max: 300
  within_profile_seconds_min: 2
  within_profile_seconds_max: 10
  typing_delay_ms_min: 50
  typing_delay_ms_max: 150
  idle_pause_seconds_min: 1
  idle_pause_seconds_max: 5

llm:
  temperature: 0.35
  max_tokens: 500
  timeout_seconds: 45
  note_option_a_limit: 200
  note_option_b_limit: 300
  comment_limit: 500

scheduler:
  outreach_cron: "0 9 * * MON-FRI"
  followup_cron: "0 10 * * *"
  followup_after_days: 14

selectors:
  profile_name:
    - "main h1"
    - "section h1"
  headline:
    - ".text-body-medium.break-words"
    - "div[data-generated-suggestion-target] + div"
  current_role:
    - "#experience ~ div li:first-child span[aria-hidden='true']"
    - "section:has(#experience) li:first-child span[aria-hidden='true']"
  mutual_connections:
    - "a[href*='facetNetwork=%5B%22F%22%5D']"
    - "span:has-text('mutual connection')"
  connect_button:
    - "button:has-text('Connect')"
    - "button[aria-label*='Invite']"
  more_button:
    - "button:has-text('More')"
  add_note_button:
    - "button:has-text('Add a note')"
  note_textarea:
    - "textarea[name='message']"
    - "textarea"
  send_button:
    - "button:has-text('Send')"
  activity_link:
    - "a[href$='/recent-activity/all/']"
    - "a[href*='recent-activity']"
  post_card:
    - "div.feed-shared-update-v2"
    - "div[data-urn*='activity']"
  like_button:
    - "button[aria-label*='React Like']"
    - "button[aria-label*='Like']"
  comment_button:
    - "button[aria-label*='Comment']"
    - "button:has-text('Comment')"
  comment_editor:
    - "div[contenteditable='true'][role='textbox']"
    - ".ql-editor"
  comment_submit:
    - "button:has-text('Post')"
    - "button[aria-label*='Post comment']"
  sent_invitations_link: "https://www.linkedin.com/mynetwork/invitation-manager/sent/"
  invitation_card:
    - "li.mn-invitation-card"
    - ".mn-invitation-card"
    - ".invitation-card"
  invitation_recipient_link:
    - "a.invitation-card__link"
    - "a[href*='/in/']"
  invitation_withdraw_button:
    - "button:has-text('Withdraw')"
    - "button[aria-label*='Withdraw']"
  confirm_withdraw_button:
    - "button.artdeco-modal__confirm-dialog-btn"
    - "div.artdeco-modal button:has-text('Withdraw')"

